# Codex 管理中心 —— 一键运行
# 用法：在本目录执行  docker compose up -d --build
# 然后浏览器访问  http://localhost:18765
services:
  codex-manager:
    build: .
    image: codex-manager:local
    container_name: codex-manager
    restart: unless-stopped
    ports:
      # 仅绑定到本机回环地址：避免把（挂载了 docker 套接字、无鉴权的）管理面板
      # 暴露到局域网。如需局域网访问，请自行改为 "18765:8080" 并自担风险。
      - "127.0.0.1:18765:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PUBLIC_DIR=/app/artifacts/docker-manager/dist/public
    volumes:
      # 挂载宿主机 Docker 套接字，使本平台可管理 Docker Desktop 中的容器/镜像/数据卷。
      # Windows Docker Desktop（Linux 容器）同样支持此路径。
      - /var/run/docker.sock:/var/run/docker.sock
